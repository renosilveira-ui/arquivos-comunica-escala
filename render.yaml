# render.yaml — Blueprint for the Escala API on Render.
# https://render.com/docs/blueprint-spec
#
# Apply via the Render dashboard: Blueprints → New Blueprint Instance →
# point at this repository. After creation, manually fill the env vars
# marked `sync: false` in the dashboard (Render does not pre-populate
# secrets from yaml).
#
# IMPORTANT — single-instance constraint
# server/integrations/comunica-plus.ts holds session/cache state in
# process memory (see docs/operations/scaling.md). Do NOT raise
# numInstances above 1 until that state is moved to a shared store.

services:
  - type: web
    name: escalas-staging
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ---- Runtime ----
      - key: NODE_ENV
        value: production

      # ---- Database (DigitalOcean Managed MySQL) ----
      # DATABASE_SSL=insecure: TLS on, cert validation off. Acceptable
      # for staging because the DO cluster ships with a self-signed CA;
      # tighten to `require` once we mount the DO CA bundle or migrate
      # to a publicly-signed cert.
      - key: DATABASE_SSL
        value: insecure
      # Full mysql:// URI with password — set in dashboard, never in yaml.
      - key: DATABASE_URL
        sync: false

      # ---- Session signing ----
      # Render generates a strong random value once and persists it across
      # deploys. No human ever sees or types this secret.
      - key: COOKIE_SECRET
        generateValue: true

      # ---- CORS ----
      # Comma-separated origins allowed to call the API with credentials.
      # Empty until the frontend is deployed; populate with the Expo Web
      # URL when it exists. With NODE_ENV=production AND empty value,
      # CORS is fully restrictive (per Frente 2.2 hardening).
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # ---- Comunica+ integration ----
      - key: COMUNICA_PLUS_URL
        value: https://comunicamais-staging.onrender.com
      - key: COMUNICA_PLUS_SYSTEM_EMAIL
        sync: false
      - key: COMUNICA_PLUS_SYSTEM_PASSWORD
        sync: false
      - key: COMUNICA_PLUS_SYSTEM_PIN
        sync: false
      - key: COMUNICA_JWKS_URI
        value: https://comunicamais-staging.onrender.com/.well-known/jwks.json
      - key: COMUNICA_ISSUER
        value: https://comunicamais-staging.onrender.com
      - key: COMUNICA_AUDIENCE
        value: escalas-app
      # Tenant code → internal id map. Semi-secret because it leaks the
      # internal id space; kept out of yaml.
      - key: COMUNICA_TENANT_MAP
        sync: false

      # ---- HospitalAlert integration (optional) ----
      - key: HOSPITAL_ALERT_URL
        value: https://hospital-alert.example.com
      - key: HOSPITAL_ALERT_API_KEY
        sync: false
      - key: HOSPITAL_ALERT_ORG_ID
        value: hsc

      # ---- Feature flags ----
      - key: SHIFT_RADAR_ENABLED
        value: "false"

  # ---------------------------------------------------------------------------
  # Frontend (Expo Web) — Static Site
  # ---------------------------------------------------------------------------
  # Built once per deploy by `pnpm build:web` (runs `expo export -p web`).
  # The bundle bakes EXPO_PUBLIC_API_URL at build time — Static Sites have no
  # runtime env, so this URL must be known at build. Currently hardcoded to
  # the staging API; for a separate prod deployment, fork render.yaml or use
  # a per-env value.
  #
  # After this service is created by the Blueprint, Render assigns a URL
  # (typically https://escalas-staging-web.onrender.com). Take that URL and
  # add it to the API service's CORS_ALLOWED_ORIGINS env var (still
  # `sync: false` above). The API then redeploys with CORS open to the web.
  - type: web
    runtime: static
    name: escalas-staging-web
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build:web
    staticPublishPath: ./web-build
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://escalas-staging.onrender.com
