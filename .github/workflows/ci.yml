name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new commit lands.
# Main branch runs are never cancelled — they must complete to provide the
# "ran on default branch" status that branch protection requires.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: escalas_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/escalas_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "::error::MySQL did not become ready within 60s"
          exit 1

      - name: Apply database schema
        # `pnpm db:push` runs `drizzle-kit generate && drizzle-kit migrate`,
        # which depends on a journal/meta directory that this repo does not
        # commit. For CI we sync the schema directly from drizzle/schema.ts
        # via `drizzle-kit push --force` (non-interactive, idempotent).
        run: pnpm exec drizzle-kit push --force

      - name: Lint
        run: pnpm lint

      - name: Typecheck server
        run: pnpm typecheck:server

      - name: Typecheck app
        run: pnpm typecheck:app

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
